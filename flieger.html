<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Raketen-Flugschule: Warp-Antrieb</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #ff4400;
        }
        #instruction {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 16px; font-weight: bold; line-height: 1.4;
            background: rgba(0,0,0,0.5); padding: 10px 0;
        }
        span.key { background: #444; padding: 2px 8px; border-radius: 4px; color: #fff; border: 1px solid #777; font-family: monospace;}
        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8); pointer-events: none; transition: box-shadow 0.3s;
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="instruction">
        <span class="key">Maus</span> Steuern | 
        <span class="key">Links-Klick</span> Turbo (Warp!)<br>
        <span class="key">Leertaste</span> Laser | 
        <span class="key">X</span> oder <span class="key">Rechts-Klick</span> Raketen-Bombe!
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 120); // Nebel etwas weiter weg

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 1. HAUPTRAKETE ---
        const rocket = new THREE.Group();
        const rocketMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.3 });
        
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 1.8, 16), rocketMat);
        body.rotation.x = Math.PI / 2;
        rocket.add(body);

        const nose = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.8, 16), new THREE.MeshStandardMaterial({ color: 0xdd0000 }));
        nose.rotation.x = Math.PI / 2; nose.position.z = -1.3;
        rocket.add(nose);

        for(let i=0; i<4; i++) {
            const fin = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.5), new THREE.MeshStandardMaterial({ color: 0xdd0000 }));
            fin.position.z = 0.6; fin.rotation.z = (i * Math.PI) / 2; fin.translateY(0.4);
            rocket.add(fin);
        }

        // --- ANTRIEBSEFFEKT (Exhaust) ---
        const exhaustGeo = new THREE.ConeGeometry(0.25, 1, 12);
        exhaustGeo.translate(0, -0.5, 0); // Ursprung an die Spitze verschieben
        const exhaustMat = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending 
        });
        const exhaust = new THREE.Mesh(exhaustGeo, exhaustMat);
        exhaust.rotation.x = -Math.PI / 2; exhaust.position.z = 0.9;
        rocket.add(exhaust);

        const exhaustLight = new THREE.PointLight(0x00ffff, 5, 12);
        exhaustLight.position.z = 1.2; rocket.add(exhaustLight);

        scene.add(rocket);

        // --- 2. GAME STATE & INPUT ---
        let currentSpeed = 0.1, score = 0;
        const BASE_SPEED = 0.1, BOOST_SPEED = 0.4; // Geschwindigkeit leicht erhöht
        let isBoosting = false, lastBoostingState = false, impactShake = 0;

        const lasers = [];
        const bombs = []; 

        const explosionLight = new THREE.PointLight(0xffffff, 0, 40);
        scene.add(explosionLight);

        // INPUT LOGIK
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) isBoosting = true; 
            if(e.button === 2) fireBomb();        
        });
        window.addEventListener('mouseup', (e) => { if(e.button === 0) isBoosting = false; });
        window.addEventListener('contextmenu', (e) => e.preventDefault()); 

        window.addEventListener('keydown', (e) => { 
            if (e.code === 'Space') { e.preventDefault(); fireLaser(); }
            if (e.code === 'KeyX') { fireBomb(); } 
        });

        function fireLaser() {
            const l = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 5, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            l.rotation.x = Math.PI / 2; l.position.copy(rocket.position); l.position.z -= 2;
            scene.add(l); lasers.push(l);
        }

        function fireBomb() {
            const b = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400 }));
            b.rotation.x = Math.PI / 2; b.position.copy(rocket.position); b.position.y -= 0.6;
            b.userData = { phase: 'drop', timer: 0, vy: -0.15, vz: -0.1 };
            const l = new THREE.PointLight(0xffaa00, 20, 10); b.add(l);
            scene.add(b); bombs.push(b);
        }

        // --- EFFEKT-SYSTEME ---
        const particles = [];
        function createExplosion(pos, color, count = 15) {
            impactShake = 0.5; // Kamera-Stoß
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 0.2, 0.2), 
                    new THREE.MeshBasicMaterial({ color: color, transparent: true })
                );
                p.position.copy(pos);
                p.userData = { 
                    vel: new THREE.Vector3((Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6, (Math.random()-0.5)*1.2),
                    life: 1.0 
                };
                scene.add(p); particles.push(p);
            }
        }

        // --- 3. WELT-OBJEKTE ---
        const rings = [];
        let lastRingZ = -60;
        const ringGeo = new THREE.TorusGeometry(2.5, 0.12, 16, 50);
        const shieldGeo = new THREE.CylinderGeometry(2.6, 2.6, 0.2, 32);

        function createRing() {
            const isShield = Math.random() < 0.4;
            let obj;
            if (isShield) {
                obj = new THREE.Mesh(shieldGeo, new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.7, emissive: 0x330000 }));
                obj.rotation.x = Math.PI / 2; obj.userData = { type: 'shield', active: true };
            } else {
                const col = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
                obj = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1 }));
                obj.userData = { type: 'ring', rotating: false, rotationProgress: 0, originalIntensity: 1 };
            }
            obj.position.set((Math.random()-0.5)*22, (Math.random()-0.5)*14, -85); // Etwas weiter weg spawnen
            scene.add(obj); rings.push(obj); lastRingZ = -85;
        }

        // --- 4. HINTERGRUND (WARP STREAKS) ---
        const starCount = 600;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 6); // 2 Punkte pro Linie (Start & Ende)
        
        for (let i = 0; i < starCount; i++) {
            const x = (Math.random() - 0.5) * 150;
            const y = (Math.random() - 0.5) * 100;
            const z = Math.random() * -150; // Verteilt im Raum vor uns
            
            // Punkt 1 (Start der Linie)
            starPositions[i * 6] = x;
            starPositions[i * 6 + 1] = y;
            starPositions[i * 6 + 2] = z;
            // Punkt 2 (Ende der Linie, initial gleich)
            starPositions[i * 6 + 3] = x;
            starPositions[i * 6 + 4] = y;
            starPositions[i * 6 + 5] = z;
        }
        
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.7 });
        const starField = new THREE.LineSegments(starGeometry, starMaterial);
        scene.add(starField);

        // LICHTER
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 2); sun.position.set(5,10,5); scene.add(sun);
        camera.position.z = 10;

        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX/window.innerWidth)*2-1; targetY = -(e.clientY/window.innerHeight)*2+1;
        });

        // --- ANIMATE ---
        function animate() {
            requestAnimationFrame(animate);
            currentSpeed += ((isBoosting ? BOOST_SPEED : BASE_SPEED) - currentSpeed) * 0.1;
            rocket.position.x += (targetX * 11 - rocket.position.x) * 0.1;
            rocket.position.y += (targetY * 8 - rocket.position.y) * 0.1;
            rocket.rotation.z = -targetX * 0.4;
            explosionLight.intensity = Math.max(0, explosionLight.intensity - 3);

            // ANTRIEB ANIMIEREN & WARP-EFFEKTE
            const boostFactor = isBoosting ? 1 : 0;
            exhaust.scale.y = 0.8 + boostFactor * 3.5 + Math.random() * 0.5;
            exhaust.material.opacity = 0.4 + boostFactor * 0.5;
            exhaust.material.color.setHex(isBoosting ? 0xffaa00 : 0x00ccff);
            exhaustLight.intensity = 5 + boostFactor * 25;
            exhaustLight.color.setHex(isBoosting ? 0xff6600 : 0x00ffff);

            // Kamera-Dynamik (FOV & Shake)
            camera.fov += ((isBoosting ? 92 : 75) - camera.fov) * 0.08;
            camera.updateProjectionMatrix();
            
            const shake = (isBoosting ? 0.08 : 0) + impactShake;
            if(shake > 0) {
                camera.position.x += (Math.random()-0.5) * shake;
                camera.position.y += (Math.random()-0.5) * shake;
            }
            impactShake *= 0.9; // Shake abklingen lassen

            // UI Update
            if (isBoosting !== lastBoostingState) {
                document.getElementById('vignette').style.boxShadow = isBoosting ? 
                    'inset 0 0 250px rgba(255,100,0,0.5)' : 'inset 0 0 150px rgba(0,0,0,0.8)';
                lastBoostingState = isBoosting;
            }

            // PARTIKEL ANIMIEREN
            for(let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life;
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            // WARP STERNE ANIMIEREN
            const pos = starField.geometry.attributes.position.array;
            const streakLength = isBoosting ? 15.0 : 1.5; // Längere Striche im Turbo
            
            for (let i = 0; i < starCount; i++) {
                // Bewege beide Punkte der Linie vorwärts
                pos[i * 6 + 2] += currentSpeed * 8; // Startpunkt Z
                pos[i * 6 + 5] = pos[i * 6 + 2] - streakLength; // Endpunkt Z (streakLength dahinter)
                
                // Wenn der Startpunkt hinter der Kamera ist, neu vorne positionieren
                if (pos[i * 6 + 2] > 10) {
                    const x = (Math.random() - 0.5) * 150;
                    const y = (Math.random() - 0.5) * 100;
                    const z = -150; // Neu ganz vorne
                    
                    pos[i * 6] = x; pos[i * 6 + 1] = y; pos[i * 6 + 2] = z; // Start
                    pos[i * 6 + 3] = x; pos[i * 6 + 4] = y; pos[i * 6 + 5] = z - streakLength; // Ende
                }
            }
            starField.geometry.attributes.position.needsUpdate = true;


            // BOMBEN LOGIK
            for (let i = bombs.length - 1; i >= 0; i--) {
                const b = bombs[i]; const d = b.userData; d.timer++;
                if (d.phase === 'drop') {
                    b.position.y += d.vy; b.position.z += d.vz;
                    if (d.timer > 15) { d.phase = 'boost'; d.vy = 0; d.vz = -2.5; b.children[0].intensity = 60; }
                } else { b.position.z += d.vz; }

                for (let j = rings.length - 1; j >= 0; j--) {
                    if (b.position.distanceTo(rings[j].position) < 3.2) {
                        explosionLight.position.copy(rings[j].position); explosionLight.intensity = 150;
                        createExplosion(rings[j].position, 0xffaa00, 25);
                        scene.remove(rings[j]); rings.splice(j, 1);
                        scene.remove(b); bombs.splice(i, 1); break;
                    }
                }
                if (b && b.position.z < -100) { scene.remove(b); bombs.splice(i, 1); }
            }

            // LASER LOGIK
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].position.z -= 1.8;
                for (let j = rings.length - 1; j >= 0; j--) {
                    if (lasers[i].position.distanceTo(rings[j].position) < 2.8) {
                        if (rings[j].userData.type === 'shield' && rings[j].userData.active) {
                            createExplosion(rings[j].position, 0xff0000, 10);
                            scene.remove(rings[j]);
                            const r = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5 }));
                            r.position.copy(rings[j].position); r.userData = { type: 'ring', rotating: false, rotationProgress: 0, originalIntensity: 1.5 };
                            rings[j] = r; scene.add(r);
                            scene.remove(lasers[i]); lasers.splice(i, 1); break;
                        } else if (rings[j].userData.type === 'ring' && !rings[j].userData.rotating) {
                            rings[j].userData.rotating = true; rings[j].material.emissiveIntensity = 8;
                            scene.remove(lasers[i]); lasers.splice(i, 1); break;
                        }
                    }
                }
                if (lasers[i] && lasers[i].position.z < -90) { scene.remove(lasers[i]); lasers.splice(i, 1); }
            }

            // RINGE BEWEGEN & DREHEN
            if (lastRingZ > -40) createRing();
            lastRingZ += currentSpeed;
            for (let i = rings.length - 1; i >= 0; i--) {
                rings[i].position.z += currentSpeed;
                if (rings[i].userData.rotating) {
                    rings[i].rotation.y += 0.2; rings[i].userData.rotationProgress += 0.2;
                    if (rings[i].userData.rotationProgress >= Math.PI * 2) {
                        rings[i].userData.rotating = false; rings[i].userData.rotationProgress = 0;
                        rings[i].rotation.y = 0; rings[i].material.emissiveIntensity = rings[i].userData.originalIntensity;
                    }
                }
                if (rocket.position.distanceTo(rings[i].position) < 2.6) {
                    if (!(rings[i].userData.type === 'shield' && rings[i].userData.active)) {
                        createExplosion(rings[i].position, 0x00ff00, 15);
                        scene.remove(rings[i]); rings.splice(i, 1);
                        score++; document.getElementById('score').innerText = score;
                    }
                } else if (rings[i].position.z > 15) { scene.remove(rings[i]); rings.splice(i, 1); }
            }
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
