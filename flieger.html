<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Raketen-Flugschule: Maximaler Einschlag!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; 
            font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #ff4400;
            display: flex; gap: 40px; pointer-events: none;
        }
        #instruction {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 16px; font-weight: bold; line-height: 1.4;
            background: rgba(0,0,0,0.5); padding: 10px 0;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0000; font-size: 80px; font-weight: bold; text-shadow: 0 0 30px #ff0000;
            display: none; text-align: center;
        }
        /* Roter Vollbild-Blitz für Kollision */
        #collision-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none; transition: opacity 0.05s ease-out;
        }
        .key { background: #444; padding: 2px 8px; border-radius: 4px; color: #fff; border: 1px solid #777; font-family: monospace;}
    </style>
</head>
<body>
    <div id="collision-flash"></div> <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div style="color: #ff4444;">LEBEN: <span id="lives">3</span></div>
    </div>

    <div id="game-over">
        GAME OVER<br>
        <span style="font-size: 24px; color: #fff;">F5 zum Neustarten</span>
    </div>

    <div id="instruction">
        <span class="key">Maus</span> Steuern | <span class="key">Links-Klick</span> Turbo<br>
        <span class="key">Leertaste</span> Laser | <span class="key">X</span> oder <span class="key">Rechts-Klick</span> Lenkrakete!
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 120);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- RAKETE ---
        const rocket = new THREE.Group();
        const rocketMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 1.8, 16), rocketMat);
        body.rotation.x = Math.PI / 2; rocket.add(body);
        const nose = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.8, 16), new THREE.MeshStandardMaterial({ color: 0xdd0000 }));
        nose.rotation.x = -Math.PI / 2; nose.position.z = -1.3; rocket.add(nose);
        for(let i=0; i<4; i++) {
            const fin = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.5), new THREE.MeshStandardMaterial({ color: 0xdd0000 }));
            fin.position.z = 0.6; fin.rotation.z = (i * Math.PI) / 2; fin.translateY(0.4); rocket.add(fin);
        }
        scene.add(rocket);

        // --- OPTIMIERUNG: GEOMETRIEN & MATERIALIEN VORDEFINIEREN ---
        const laserGeo = new THREE.CylinderGeometry(0.06, 0.06, 5, 8);
        const laserMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const enemyLaserGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
        const enemyLaserMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        
        const bombGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8, 8);
        const bombMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400 });
        
        const ufoBodyGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.4, 32);
        const ufoBodyMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
        const ufoDomeGeo = new THREE.SphereGeometry(0.7, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const ufoDomeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
        const partMatShared = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.8 });

        // --- GAME STATE ---
        let currentSpeed = 0.1, score = 0, lives = 3;
        let isBoosting = false, gameOver = false, invulnerable = 0;
        const lasers = []; const bombs = []; const rings = []; const enemies = []; const enemyLasers = [];
        
        // Neu: Lichter für Kollision & Explosion
        const explosionLight = new THREE.PointLight(0xff0000, 0, 50);
        scene.add(explosionLight);
        const collisionLight = new THREE.PointLight(0xffffff, 0, 30);
        scene.add(collisionLight);

        // Neu: Partikelsystem für Kollisionsrauch
        const particles = [];
        const partGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const _vec = new THREE.Vector3(); // Hilfsvektor für Berechnungen

        function createCollisionParticles(pos, count = 40) {
            for(let i=0; i<count; i++) { 
                // Kein .clone() mehr! Wir nutzen das geteilte Material.
                const p = new THREE.Mesh(partGeo, partMatShared);
                p.position.copy(pos);
                p.position.x += (Math.random()-0.5)*2;
                p.position.y += (Math.random()-0.5)*2;
                p.userData = { vy: (Math.random()-0.5)*0.2, vx: (Math.random()-0.5)*0.2, vz: currentSpeed + Math.random()*0.1, life: 1.0 + Math.random() }; // Zufällige Lebensdauer
                scene.add(p);
                particles.push(p);
            }
        }

        // --- GEGNER: UFOs ---
        function spawnUFO() {
            const ufo = new THREE.Group();
            const body = new THREE.Mesh(ufoBodyGeo, ufoBodyMat);
            ufo.add(body);
            const dome = new THREE.Mesh(ufoDomeGeo, ufoDomeMat);
            dome.position.y = 0.1; ufo.add(dome);
            
            // Startposition zentraler wählen (Bereich ca. -7.5 bis 7.5 auf X und -5 bis 5 auf Y)
            const startX = (Math.random() - 0.5) * 15;
            const startY = (Math.random() - 0.5) * 10;
            ufo.position.set(startX, startY, -100);
            
            // Zusätzliche Daten für die Zick-Zack-Bewegung speichern
            ufo.userData = { 
                shotTimer: Math.random() * 60,
                baseX: startX,
                baseY: startY,
                phase: Math.random() * Math.PI * 2,
                isDying: false,
                dyingTimer: 0
            };
            scene.add(ufo); enemies.push(ufo);
        }

        function fireEnemyLaser(pos) {
            const l = new THREE.Mesh(enemyLaserGeo, enemyLaserMat);
            l.rotation.x = Math.PI / 2; l.position.copy(pos);
            scene.add(l); enemyLasers.push(l);
        }

        // INPUT
        window.addEventListener('mousedown', (e) => { if(!gameOver) { if(e.button === 0) isBoosting = true; if(e.button === 2) fireBomb(); }});
        window.addEventListener('mouseup', (e) => { if(e.button === 0) isBoosting = false; });
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('keydown', (e) => { 
            if(gameOver) return;
            if (e.code === 'Space') { e.preventDefault(); fireLaser(); }
            if (e.code === 'KeyX') fireBomb();
        });

        function fireLaser() {
            const l = new THREE.Mesh(laserGeo, laserMat);
            l.rotation.x = Math.PI / 2; l.position.copy(rocket.position); l.position.z -= 2;
            scene.add(l); lasers.push(l);
        }

        function fireBomb() {
            const b = new THREE.Mesh(bombGeo, bombMat);
            b.rotation.x = Math.PI / 2; b.position.copy(rocket.position); b.position.y -= 0.6;
            b.userData = { phase: 'drop', timer: 0, vy: -0.15, vz: -0.1 };
            scene.add(b); bombs.push(b);
        }

        // --- WELT ---
        const ringGeo = new THREE.TorusGeometry(2.5, 0.12, 16, 50);
        const shieldGeo = new THREE.CylinderGeometry(2.6, 2.6, 0.2, 32);
        let lastRingZ = -60;

        function createRing() {
            const isShield = Math.random() < 0.4;
            let obj;
            if (isShield) {
                obj = new THREE.Mesh(shieldGeo, new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.7, emissive: 0xaa0000 }));
                obj.rotation.x = Math.PI / 2; obj.userData = { type: 'shield', active: true };
            } else {
                const col = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
                obj = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1 }));
                obj.userData = { type: 'ring', rotating: false, rotationProgress: 0, originalIntensity: 1 };
            }
            obj.position.set((Math.random()-0.5)*22, (Math.random()-0.5)*14, -85);
            scene.add(obj); rings.push(obj); lastRingZ = -85;
        }

        // --- WARP STERNE ---
        const starCount = 600;
        const starPos = new Float32Array(starCount * 6);
        for (let i = 0; i < starCount; i++) {
            const x = (Math.random()-0.5)*150, y = (Math.random()-0.5)*100, z = Math.random()*-150;
            starPos[i*6]=x; starPos[i*6+1]=y; starPos[i*6+2]=z; starPos[i*6+3]=x; starPos[i*6+4]=y; starPos[i*6+5]=z;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starField = new THREE.LineSegments(starGeo, new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.7 }));
        scene.add(starField);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 2); sun.position.set(5,10,5); scene.add(sun);
        camera.position.z = 10;
        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (e) => { targetX = (e.clientX/window.innerWidth)*2-1; targetY = -(e.clientY/window.innerHeight)*2+1; });

        // Neu: Kamera-Wackeln Parameter
        let cameraShake = 0;

        // --- ANIMATE ---
        function animate() {
            if(gameOver) return;
            requestAnimationFrame(animate);

            // Sanfte Kamerarückkehr zur Normalposition
            camera.position.x += (0 - camera.position.x) * 0.1;
            camera.position.y += (0 - camera.position.y) * 0.1;

            // Kamera-Wackeln anwenden
            if (cameraShake > 0) {
                cameraShake *= 0.9; // Shake nimmt ab
                camera.position.x += (Math.random()-0.5) * cameraShake;
                camera.position.y += (Math.random()-0.5) * cameraShake;
                if (cameraShake < 0.01) cameraShake = 0;
            }

            currentSpeed += (((isBoosting ? 0.4 : 0.1)) - currentSpeed) * 0.1;
            rocket.position.x += (targetX * 11 - rocket.position.x) * 0.1;
            rocket.position.y += (targetY * 8 - rocket.position.y) * 0.1;
            rocket.rotation.z = -targetX * 0.4;

            // NEU: Taumeln-Effekt bei Kollision
            if (invulnerable > 0) {
                const strength = invulnerable / 180; // Effekt wird schwächer, je mehr Zeit vergeht
                rocket.rotation.x = Math.sin(Date.now() * 0.02) * 0.4 * strength;
                rocket.rotation.y = Math.cos(Date.now() * 0.015) * 0.4 * strength;
                rocket.position.x += (Math.random() - 0.5) * strength * 0.6;
                rocket.position.y += (Math.random() - 0.5) * strength * 0.6;
            } else {
                rocket.rotation.x = 0; rocket.rotation.y = 0;
            }
            
            // Unverwundbarkeit blinken
            if(invulnerable > 0) {
                invulnerable--;
                rocket.visible = Math.floor(invulnerable / 5) % 2 === 0;
            } else { rocket.visible = true; }
            explosionLight.intensity = Math.max(0, explosionLight.intensity - 5);
            collisionLight.intensity = Math.max(0, collisionLight.intensity - 10);

            // PARTIKEL ANIMIEREN (Kollisionsrauch)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; const d = p.userData;
                p.position.x += d.vx; p.position.y += d.vy; p.position.z += d.vz;
                d.vz *= 0.98; d.vy += 0.005; d.vx *= 0.99; // Physik
                d.life -= 0.006; // Rauch hält jetzt deutlich länger an
                p.scale.setScalar(d.life * 2);
                if(d.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            // WARP STERNE
            const pArr = starField.geometry.attributes.position.array;
            const sl = isBoosting ? 15.0 : 1.5;
            for (let i = 0; i < starCount; i++) {
                pArr[i*6+2] += currentSpeed * 8; pArr[i*6+5] = pArr[i*6+2] - sl;
                if (pArr[i*6+2] > 10) {
                    const x = (Math.random()-0.5)*150, y = (Math.random()-0.5)*100, z = -150;
                    pArr[i*6]=x; pArr[i*6+1]=y; pArr[i*6+2]=z; pArr[i*6+3]=x; pArr[i*6+4]=y; pArr[i*6+5]=z-sl;
                }
            }
            starField.geometry.attributes.position.needsUpdate = true;

            // GEGNER LOGIK
            if (Math.random() < 0.005) spawnUFO(); // Reduzierter Spawn (0.5%)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const ufo = enemies[i];
                const d = ufo.userData;

                if (d.isDying) {
                    d.dyingTimer++;
                    // Taumeln: Wilde Rotation und leichtes Zittern
                    ufo.rotation.x += 0.2;
                    ufo.rotation.z += 0.3;
                    ufo.position.x += (Math.random() - 0.5) * 0.5;
                    ufo.position.y += (Math.random() - 0.5) * 0.5;
                    ufo.position.z += currentSpeed * 0.5; // Driftet langsam weiter

                    // Ständiger Rauch während des Taumelns
                    if (d.dyingTimer % 4 === 0) createCollisionParticles(ufo.position, 6);

                    if (d.dyingTimer > 50) { // Nach ca. 0.8 Sekunden explodieren
                        explosionLight.position.copy(ufo.position);
                        explosionLight.color.setHex(0x00ffff); // Cyan-farbene Explosion
                        explosionLight.intensity = 200;
                        createCollisionParticles(ufo.position, 40); // Finale große Wolke
                        scene.remove(ufo); enemies.splice(i, 1);
                        score += 10; document.getElementById('score').innerText = score;
                        continue;
                    }
                } else {
                    ufo.position.z += currentSpeed + 0.05;
                    ufo.position.x = d.baseX + Math.sin(Date.now() * 0.003 + d.phase) * 5;
                    ufo.position.y = d.baseY + Math.cos(Date.now() * 0.002 + d.phase) * 3;
                    ufo.rotation.y += 0.05;
                    d.shotTimer++;
                    if(d.shotTimer > 100) { fireEnemyLaser(ufo.position); d.shotTimer = 0; }
                }

                // Kollision Spieler-Laser mit UFO (nur wenn es noch lebt)
                lasers.forEach((l, li) => {
                    if(!d.isDying && l.position.distanceTo(ufo.position) < 2) {
                        d.isDying = true;
                        scene.remove(l); lasers.splice(li, 1);
                    }
                });
                if(ufo.position.z > 15) { scene.remove(ufo); enemies.splice(i, 1); }
            }

            // FEINDLICHE LASER BEWEGUNG & KOLLISION
            enemyLasers.forEach((el, i) => {
                el.position.z += 0.8;
                if (el.position.distanceTo(rocket.position) < 1.0 && invulnerable <= 0) {
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    const flash = document.getElementById('collision-flash');
                    flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 50);
                    createCollisionParticles(rocket.position);
                    invulnerable = 180; cameraShake = 1.5;
                    scene.remove(el); enemyLasers.splice(i, 1);
                    if(lives <= 0) {
                        gameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                    }
                }
                if(el.position.z > 15) { scene.remove(el); enemyLasers.splice(i, 1); }
            });

            // LENKRAKETEN LOGIK
            for (let i = bombs.length - 1; i >= 0; i--) {
                const b = bombs[i];
                const d = b.userData; d.timer++;
                
                if (d.phase === 'drop') {
                    b.position.y += d.vy; b.position.z += d.vz;
                    if (d.timer > 15) d.phase = 'boost';
                } else {
                    // Suche nach dem nächsten lebendigen UFO
                    let target = null;
                    let minDist = 150;
                    enemies.forEach(ufo => {
                        if (!ufo.userData.isDying) {
                            const dist = b.position.distanceTo(ufo.position);
                            if (dist < minDist) { minDist = dist; target = ufo; }
                        }
                    });

                    if (target) {
                        // Lenk-Mechanik: Rakete zum UFO drehen und darauf zufliegen
                        b.lookAt(target.position);
                        b.rotateX(Math.PI / 2); // Korrektur für Cylinder-Ausrichtung
                        _vec.subVectors(target.position, b.position).normalize();
                        b.position.addScaledVector(_vec, 1.5);
                    } else {
                        b.position.z -= 2.0; // Geradeaus, wenn kein Ziel da ist
                    }
                }

                // Kollision mit Ringen
                rings.forEach((r, j) => {
                    if (b.position.distanceTo(r.position) < 3.2) {
                        explosionLight.color.setHex(0xffaa00); explosionLight.position.copy(r.position); explosionLight.intensity = 150;
                        scene.remove(r); rings.splice(j, 1); scene.remove(b); bombs.splice(i, 1);
                    }
                });

                // Kollision mit UFOs (Treffer löst Sterbe-Animation aus)
                if (bombs[i]) {
                    enemies.forEach(ufo => {
                        if (!ufo.userData.isDying && b.position.distanceTo(ufo.position) < 3) {
                            ufo.userData.isDying = true;
                            scene.remove(b); bombs.splice(i, 1);
                        }
                    });
                }

                if (bombs[i] && b.position.z < -120) { scene.remove(b); bombs.splice(i, 1); }
            }

            lasers.forEach((l, i) => {
                l.position.z -= 1.8;
                rings.forEach((r, j) => {
                    if (l.position.distanceTo(r.position) < 2.8) {
                        if (r.userData.type === 'shield') {
                            scene.remove(r);
                            const nr = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5 }));
                            nr.position.copy(r.position); nr.userData = { type: 'ring', rotating: false, rotationProgress: 0, originalIntensity: 1.5 };
                            rings[j] = nr; scene.add(nr); scene.remove(l); lasers.splice(i, 1);
                        } else if(!r.userData.rotating) {
                            r.userData.rotating = true; r.material.emissiveIntensity = 8; scene.remove(l); lasers.splice(i, 1);
                        }
                    }
                });
            });

            // RINGE & KOLLISION
            if (lastRingZ > -40) createRing();
            lastRingZ += currentSpeed;
            for (let i = rings.length - 1; i >= 0; i--) {
                rings[i].position.z += currentSpeed;
                if (rings[i].userData.rotating) {
                    rings[i].rotation.y += 0.2; rings[i].userData.rotationProgress += 0.2;
                    if (rings[i].userData.rotationProgress >= Math.PI * 2) {
                        rings[i].userData.rotating = false; rings[i].userData.rotationProgress = 0;
                        rings[i].rotation.y = 0; rings[i].material.emissiveIntensity = rings[i].userData.originalIntensity;
                    }
                }
                
                // KOLLISIONS-CHECK MIT RAKETE
                if (rocket.position.distanceTo(rings[i].position) < 2.5) {
                    if (rings[i].userData.type === 'shield' && rings[i].userData.active && invulnerable <= 0) {
                        
                        // DEUTLICHE KOLLISIONS-EFFEKTE:
                        
                        lives--;
                        document.getElementById('lives').innerText = lives;

                        // 1. VOLLBILD-BLITZ (HTML/CSS)
                        const flash = document.getElementById('collision-flash');
                        flash.style.opacity = '1';
                        setTimeout(() => flash.style.opacity = '0', 50); // Schnell wieder weg

                        // 2. PARTIKELWOLKE (Dunkler Rauch)
                        createCollisionParticles(rocket.position);

                        // 3. LICHT-BLITZ (Im 3D Raum)
                        collisionLight.color.setHex(0xffffff);
                        collisionLight.position.copy(rocket.position);
                        collisionLight.intensity = 200;

                        invulnerable = 180; // Längere Schutzzeit & Taumel-Dauer (3 Sek bei 60 FPS)
                        cameraShake = 2.0; // Hartes Kamera-Wackeln starten

                        if(lives <= 0) {
                            gameOver = true;
                            document.getElementById('game-over').style.display = 'block';
                        }
                    } else if (rings[i].userData.type === 'ring') {
                        scene.remove(rings[i]); rings.splice(i, 1);
                        score++; document.getElementById('score').innerText = score;
                    }
                }
                if (rings[i] && rings[i].position.z > 15) { scene.remove(rings[i]); rings.splice(i, 1); }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
